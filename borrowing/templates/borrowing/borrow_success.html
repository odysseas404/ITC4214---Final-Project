{% extends "base.html" %}
{% load static %}

{% block extra_css %}
    {{ block.super }}

    <!-- Loads the CSS file for the borrowing app. -->
    <link rel="stylesheet" href="{% static 'borrowing/css/borrowing.css' %}">

{% endblock %}

{% block content %}

<!-- Main wrapper for the borrow success page. -->
<div class="borrow-page">

    <!-- Main panel that contains the success message. -->
    <div class="borrow-wrapper-card">

        <!-- Success page heading and message. -->
        <div class="borrow-header">
            
            <h1>Borrow Request Submitted</h1>

            <p>
                Your camera borrow request has been submitted successfully.
                An administrator will review it.
            </p>

        </div>

        <!-- Success page navigation buttons. -->
        <div class="borrow-bottom-buttons">

            <a 
                href="{% url 'accounts_app:dashboard' %}" 
                class="btn"
                aria-label="View your user dashboard">
                View My Dashboard
            </a>

            <a 
                href="{% url 'catalogue:home' %}" 
                class="btn"
                aria-label="Return to the camera catalogue">
                Back to Catalogue
            </a>

        </div>

    </div>

</div>

{% endblock %}
