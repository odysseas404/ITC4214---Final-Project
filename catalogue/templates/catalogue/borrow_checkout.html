{% extends "catalogue/base_catalogue.html" %}

{% block catalogue_content %}

<h1>Confirm Borrow Request</h1>

<h2>Cameras in your basket</h2>

{% for camera in cameras %}

    <p>
        <strong>{{ camera.name }}</strong> — {{ camera.manufacturer }}
    </p>

{% endfor %}

<h2>Trip Information</h2>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Submit Borrow Request
    </button>
</form>

<p>
    <a href="{% url 'catalogue:borrow_basket' %}">
        Back to basket
    </a>
</p>

{% endblock %}
