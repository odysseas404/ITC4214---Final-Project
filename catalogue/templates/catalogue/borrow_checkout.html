{% extends "catalogue/base_catalogue.html" %}

{% block catalogue_content %}

<div class="glass-card">

    <h1>Confirm Borrow Request</h1>

    <h2>Cameras in your basket</h2>

    {% for camera in cameras %}
        <p>
            <span class="info-label">{{ camera.name }}</span> — {{ camera.manufacturer }}
        </p>
    {% endfor %}

    <hr>

    <h2>Trip Information</h2>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <div class="button-row">
            <button type="submit" class="btn">
                Submit Borrow Request
            </button>

            <a href="{% url 'catalogue:borrow_basket' %}" class="btn">
                Back to basket
            </a>
        </div>
    </form>

</div>

{% endblock %}
