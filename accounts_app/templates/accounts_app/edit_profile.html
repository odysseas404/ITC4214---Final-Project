{% extends "base.html" %}

{% block content %}

<div class="glass-card form-box">

    <h1>Edit Profile</h1>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <div class="button-row profile-button-row">
            <button type="submit" class="btn">
                Save changes
            </button>

            <a href="{% url 'accounts_app:profile' %}" class="btn">
                Back to profile
            </a>
        </div>
    </form>

</div>

{% endblock %}
