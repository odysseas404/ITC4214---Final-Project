{% extends "base.html" %}

{% block content %}

<div class="glass-card">

    <h1>My Profile</h1>

    <p><span class="info-label">Username:</span> {{ user.username }}</p>
    <p><span class="info-label">First name:</span> {{ user.first_name }}</p>
    <p><span class="info-label">Last name:</span> {{ user.last_name }}</p>
    <p><span class="info-label">Email:</span> {{ user.email }}</p>
    <p><span class="info-label">Date joined:</span> {{ user.date_joined }}</p>

    <div class="button-row">
        <a href="{% url 'accounts_app:edit_profile' %}" class="btn">
            Edit profile
        </a>

        <a href="{% url 'accounts_app:dashboard' %}" class="btn">
            Back to dashboard
        </a>
    </div>

</div>

{% endblock %}
