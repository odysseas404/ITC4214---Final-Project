{% extends "base.html" %}

{% block content %}

<div class="section-box form-box dark-card">

    <h1>Login</h1>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <div class="button-row">
            <button type="submit" class="btn btn-dark rounded-button">
                Login
            </button>

            <a href="{% url 'catalogue:home' %}" class="btn btn-dark rounded-button">
                Back to home
            </a>
        </div>

    </form>

</div>

{% endblock %}
