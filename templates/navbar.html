{% load static %}

<!-- Main navigation bar which uses Bootstrap classes for layout and responsiveness. -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <!-- Website logo that returns to the homepage once clicked. -->
        <a class="navbar-brand" href="{% url 'catalogue:home' %}">

            <img src="{% static 'images/logo.webp' %}" alt="Escapism logo" 
            class="site-logo">

        </a>

        <!-- Button shown on smaller screens to open and close the navigation menu. -->
        <button 
            class="navbar-toggler" 
            type="button" 
            data-bs-toggle="collapse" 
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Collapsible navigation links. -->
        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="btn nav-button" href="{% url 'catalogue:home' %}">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="btn nav-button" href="{% url 'catalogue:about' %}">
                        About
                    </a>
                </li>

                {% if user.is_authenticated %}

                    <li class="nav-item">
                        <a class="btn nav-button" href="{% url 'accounts_app:dashboard' %}">
                            Dashboard
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="btn nav-button" href="{% url 'accounts_app:profile' %}">
                            Profile
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="btn nav-button" href="{% url 'borrowing:borrow_basket' %}">
                            Borrow Basket
                        </a>
                    </li>
                    
                    <!--Checks whether the user can view the admin button and displays it only if the condition is True.-->
                    {% if can_view_custom_admin %}
                    <li class="nav-item">
                        <a class="btn nav-button" href="{% url 'custom_admin_panel:admin_dashboard' %}        "aria-label="Open the custom admin panel">
                            Admin Panel
                        </a>
                    </li>
                    {% endif %}

                    <!-- Logout uses POST for security and includes a CSRF token. -->
                    <li class="nav-item">
                        <form method="post" action="{% url 'logout' %}">
                            {% csrf_token %}

                            <button type="submit" class="btn nav-button">
                                Logout
                            </button>
                        </form>
                    </li>

                <!-- Links shown only when the user is not logged in. -->
                {% else %}

                    <li class="nav-item">
                        <a class="btn nav-button" href="{% url 'login' %}">
                            Login
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="btn nav-button" href="{% url 'accounts_app:register' %}">
                            Register
                        </a>
                    </li>

                {% endif %}

            </ul>

        </div>
    </div>
</nav>
