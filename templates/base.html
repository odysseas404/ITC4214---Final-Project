{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- Makes the website responsive on different screen sizes. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escapism</title>

    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet">

    <!-- Global custom CSS file for the whole website. -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    {% block extra_css %}
    {% endblock %}

</head>

<body>

    <!-- Includes the global navigation bar. -->
    {% include "navbar.html" %}

    <!-- Main content area. Child templates place their page content here. -->
    <main class="container py-4">

        {% block content %}

        {% endblock %}

    </main>

    {% include "footer.html" %}

    <!-- Bootstrap JavaScript bundle used for interactive Bootstrap components. -->
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
